<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - Staff Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/staff.css') }}?v=2">
    <style>
        .details-page {
            padding: 32px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }

        .book-hero {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 32px;
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }

        .book-cover-placeholder {
            width: 120px;
            height: 160px;
            min-width: 120px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }

        .book-hero-info h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 6px;
            color: #fff;
        }

        .book-hero-info .author {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 16px;
        }

        .book-meta-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .meta-chip {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            color: #ccc;
        }

        .meta-chip strong { color: #fff; display: block; font-size: 18px; }
        .meta-chip .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }

        .chip-available strong { color: #22c55e; }
        .chip-unavailable strong { color: #ef4444; }

        .expire-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .expire-btn:hover { background: #2a2a2a; color: #fff; }

        /* Sections */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .details-grid { grid-template-columns: 1fr; }
        }

        .section-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
        }

        .section-header {
            padding: 16px 20px;
            border-bottom: 1px solid #1e1e1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .section-count {
            background: #222;
            color: #aaa;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .person-list { padding: 0; }

        .person-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid #1a1a1a;
            transition: background 0.15s;
        }

        .person-item:last-child { border-bottom: none; }
        .person-item:hover { background: #161616; }

        .person-avatar {
            width: 36px;
            height: 36px;
            min-width: 36px;
            background: #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #ccc;
        }

        .person-info { flex: 1; }
        .person-name { font-weight: 600; color: #fff; font-size: 14px; }
        .person-meta { color: #666; font-size: 12px; margin-top: 2px; }

        .person-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-borrowed { background: #13250f; color: #4ade80; border: 1px solid #166534; }
        .badge-approved { background: #1c1a07; color: #fbbf24; border: 1px solid #78350f; }
        .badge-requested { background: #0f1225; color: #93c5fd; border: 1px solid #1e40af; }
        .badge-queued { background: #150f25; color: #c4b5fd; border: 1px solid #4c1d95; }

        .person-action {
            margin-left: auto;
        }

        .btn-collected {
            background: #13250f;
            border: 1px solid #166534;
            color: #4ade80;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-collected:hover { background: #166534; color: #fff; }

        .empty-state {
            padding: 32px 20px;
            text-align: center;
            color: #555;
            font-size: 14px;
        }

        .loading-text {
            padding: 24px 20px;
            color: #555;
            text-align: center;
            font-size: 14px;
        }

        /* Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            display: none;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Portal</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/staff/dashboard"><i data-lucide="layout-dashboard" class="icon"></i> Dashboard</a>
                <a href="/staff/dashboard"><i data-lucide="users" class="icon"></i> Student Roster</a>
                <a href="/staff/dashboard"><i data-lucide="clipboard-list" class="icon"></i> Borrow Requests</a>
                <a href="#" id="logoutBtn" style="color: #787878;"><i data-lucide="log-out" class="icon"></i> Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <h1 id="pageTitle">Book Details</h1>
                <div class="staff-profile">Admin Portal</div>
            </header>

            <div style="padding: 0 32px;">
                <div class="details-page" style="padding: 24px 0;">
                    <a href="/staff/dashboard" class="back-link">
                        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back to Dashboard
                    </a>

                    <!-- Book Hero -->
                    <div class="book-hero" id="bookHero">
                        <div class="loading-text">Loading book information...</div>
                    </div>

                    <!-- Details Grid -->
                    <div class="details-grid">
                        <!-- Active Holders -->
                        <div class="section-card">
                            <div class="section-header">
                                <h2><i data-lucide="book-open" style="width:14px;height:14px;margin-right:6px;vertical-align:middle;"></i> Active Borrowers &amp; Awaiting Collection</h2>
                                <span class="section-count" id="holdersCount">0</span>
                            </div>
                            <div class="person-list" id="holdersList">
                                <div class="loading-text">Loading...</div>
                            </div>
                        </div>

                        <!-- Pending Requests -->
                        <div class="section-card">
                            <div class="section-header">
                                <h2><i data-lucide="clock" style="width:14px;height:14px;margin-right:6px;vertical-align:middle;"></i> Pending Borrow Requests</h2>
                                <span class="section-count" id="requestsCount">0</span>
                            </div>
                            <div class="person-list" id="requestsList">
                                <div class="loading-text">Loading...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        const BOOKID = "{{ bookid }}";
        const API_BASE = '/api/staff';

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch(`${API_BASE}/logout`, { method: 'POST' });
            window.location.href = '/staff';
        });

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            t.style.borderColor = isError ? '#ef4444' : '#22c55e';
            setTimeout(() => { t.style.display = 'none'; }, 3500);
        }

        function initials(name) {
            return (name || 'U').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        }

        function formatDate(d) {
            if (!d) return '—';
            return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        async function loadBookDetails() {
            try {
                const res = await fetch(`${API_BASE}/book/${BOOKID}`);
                if (res.status === 401) { window.location.href = '/staff'; return; }
                const data = await res.json();
                if (!data.success) { showToast('Book not found', true); return; }

                const book = data.book;
                const avail = book.availablecopies;
                const total = data.total_copies || book.totalcopies || '?';
                const isAvail = avail > 0;

                // Heroes
                document.getElementById('pageTitle').textContent = book.title;
                document.getElementById('bookHero').innerHTML = `
                    <div class="book-cover-placeholder">
                        <i data-lucide="book" style="width:40px;height:40px;"></i>
                    </div>
                    <div class="book-hero-info" style="flex:1;">
                        <h1>${esc(book.title)}</h1>
                        <div class="author">by ${esc(book.author || 'Unknown Author')}</div>
                        <div class="book-meta-chips">
                            <div class="meta-chip ${isAvail ? 'chip-available' : 'chip-unavailable'}">
                                <span class="label">Available</span>
                                <strong>${avail}</strong>
                            </div>
                            <div class="meta-chip">
                                <span class="label">Total Copies</span>
                                <strong>${total}</strong>
                            </div>
                            <div class="meta-chip">
                                <span class="label">Category</span>
                                <strong style="font-size:14px;">${esc(book.category || 'General')}</strong>
                            </div>
                            <div class="meta-chip">
                                <span class="label">Book ID</span>
                                <strong style="font-size:14px;">${esc(book.bookid)}</strong>
                            </div>
                        </div>
                        <button class="expire-btn" onclick="expireApprovals()">
                            <i data-lucide="clock-x" style="width:13px;height:13px;margin-right:5px;vertical-align:middle;"></i>
                            Expire Overdue Approvals
                        </button>
                    </div>
                `;

                // Holders (borrowed + approved)
                const holders = data.active_holders || [];
                document.getElementById('holdersCount').textContent = holders.length;
                const holdersList = document.getElementById('holdersList');

                if (holders.length === 0) {
                    holdersList.innerHTML = '<div class="empty-state">No one currently holds this book.</div>';
                } else {
                    holdersList.innerHTML = holders.map(h => {
                        const isApproved = h.status === 'approved';
                        const badgeClass = isApproved ? 'badge-approved' : 'badge-borrowed';
                        const badgeText = isApproved ? 'Awaiting Collection' : 'Borrowed';
                        const dateLabel = isApproved
                            ? `Pickup deadline: <strong>${formatDate(h.pickup_deadline)}</strong>`
                            : `Due: <strong>${formatDate(h.duedate)}</strong>`;
                        const actionBtn = isApproved
                            ? `<button class="btn-collected" onclick="markCollected('${h.transactionid}')">Mark Collected</button>`
                            : '';

                        return `
                        <div class="person-item">
                            <div class="person-avatar">${initials(h.fullname)}</div>
                            <div class="person-info">
                                <div class="person-name">${esc(h.fullname)}</div>
                                <div class="person-meta">${esc(h.username)} &bull; ${dateLabel}</div>
                            </div>
                            <span class="person-badge ${badgeClass}">${badgeText}</span>
                            ${actionBtn}
                        </div>`;
                    }).join('');
                }

                // Pending requests
                const reqs = data.pending_requests || [];
                document.getElementById('requestsCount').textContent = reqs.length;
                const reqList = document.getElementById('requestsList');

                if (reqs.length === 0) {
                    reqList.innerHTML = '<div class="empty-state">No pending borrow requests.</div>';
                } else {
                    reqList.innerHTML = reqs.map((r, idx) => {
                        const badgeClass = r.status === 'queued' ? 'badge-queued' : 'badge-requested';
                        const badgeText = r.status === 'queued' ? `Queue #${idx + 1}` : 'Requested';
                        return `
                        <div class="person-item">
                            <div class="person-avatar">${initials(r.fullname)}</div>
                            <div class="person-info">
                                <div class="person-name">${esc(r.fullname)}</div>
                                <div class="person-meta">${esc(r.username)} &bull; Requested: ${formatDate(r.borrowdate)}</div>
                            </div>
                            <span class="person-badge ${badgeClass}">${badgeText}</span>
                        </div>`;
                    }).join('');
                }

                lucide.createIcons();
            } catch (err) {
                console.error(err);
                showToast('Error loading book details', true);
            }
        }

        async function markCollected(txid) {
            if (!confirm('Confirm that the student has physically collected this book?')) return;
            try {
                const res = await fetch(`${API_BASE}/request/collected`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transactionid: txid })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message);
                    await loadBookDetails();
                } else {
                    showToast(data.message, true);
                }
            } catch (err) {
                showToast('Error updating status', true);
            }
        }

        async function expireApprovals() {
            try {
                const res = await fetch(`${API_BASE}/expire_approvals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                showToast(data.message);
                if (data.expired > 0) await loadBookDetails();
            } catch (err) {
                showToast('Error expiring approvals', true);
            }
        }

        function esc(text) {
            if (!text) return '';
            const d = document.createElement('div');
            d.textContent = String(text);
            return d.innerHTML;
        }

        loadBookDetails();
    </script>
</body>
</html>

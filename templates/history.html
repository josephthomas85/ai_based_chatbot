<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrow/Return History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .history-page {
            display: flex;
            flex-direction: column;
            flex: 1;
            background: #f6f6f6;
            min-height: calc(100vh - 60px);
        }

        .history-header {
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #818181 0%, #6b6b6b 100%);
            color: white;
        }

        .history-header h2 {
            margin: 0;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .history-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .history-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
        }

        #historyContainer {
            width: 100%;
        }

        .history-table-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table thead {
            background: #454545;
            color: white;
        }

        .history-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #2c3e50;
        }

        .history-table tbody tr {
            border-bottom: 1px solid #ecf0f1;
            transition: background-color 0.2s;
        }

        .history-table tbody tr:hover {
            background-color: #f8f8f8;
        }

        .history-table td {
            padding: 12px 15px;
            font-size: 14px;
        }

        .history-table td.title {
            font-weight: 600;
            color: #3a3a3a;
        }

        .history-table td.author {
            color: #888888;
            font-size: 13px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.returned {
            background-color: #e9e9e9;
            color: #7c7c7c;
        }

        .status-badge.borrowed {
            background-color: #e8e8e8;
            color: #a6a6a6;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #888888;
        }

        .no-data-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .history-footer {
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #ecf0f1;
            background: white;
        }

        .btn-action {
            display: inline-block;
            padding: 10px 20px;
            background: #818181;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: #6b6b6b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h1><i data-lucide="library"></i> Library Management System</h1>
            </div>
            <div class="navbar-right">
                <a href="{{ url_for('notifications_page') }}" id="notificationBtn" class="btn-notification" title="Notifications">
                    <i data-lucide="bell"></i> <span id="notificationCount" class="badge"></span>
                </a>
                <span id="userName" class="user-info"></span>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </div>
    </header>

    <div class="history-page" data-userid="{{ userid }}" data-fullname="{{ fullname }}">
        <div class="history-header">
            <h2><i data-lucide="history"></i> Your Transaction History</h2>
            <p>View all your borrowed and returned books</p>
        </div>

        <div class="history-content">
            <div id="historyContainer">
                <div class="no-data">
                    <div class="no-data-icon"><i data-lucide="loader" class="animate-spin"></i></div>
                    <p>Loading...</p>
                </div>
            </div>
        </div>

        <div class="history-footer">
            <button id="backHome" class="btn-action"><i data-lucide="arrow-left" style="width:16px; height:16px; vertical-align:middle;"></i> Back to Home</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/history.js') }}"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>

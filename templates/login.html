<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>📚 Library Management System</h1>
            <p class="subtitle">AI-Powered Library Assistant</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="Enter your username" 
                        required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Enter your password" 
                        required>
                </div>
                
                <button type="submit" class="btn-login">Login</button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <p class="register-link">
                Don't have an account? <a href="#" id="registerToggle">Register here</a>
            </p>
        </div>
        
        <!-- Register Form -->
        <div class="register-box" id="registerBox" style="display: none;">
            <h1>📚 Create Account</h1>
            <p class="subtitle">Register for Library Management</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input 
                        type="text" 
                        id="fullname" 
                        class="form-input" 
                        placeholder="Enter your full name" 
                        required>
                </div>
                
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input 
                        type="text" 
                        id="regUsername" 
                        class="form-input" 
                        placeholder="Choose a username" 
                        required>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input 
                        type="password" 
                        id="regPassword" 
                        class="form-input" 
                        placeholder="Create a password" 
                        required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email (Optional)</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="Enter your email">
                </div>
                
                <button type="submit" class="btn-login">Register</button>
            </form>
            
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
            
            <p class="register-link">
                Already have an account? <a href="#" id="loginToggle">Login here</a>
            </p>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
